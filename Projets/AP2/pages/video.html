    <div class="container mt-5">
        <h1 class="text-center mb-4">Dernière vidéo de la chaîne Hyrst</h1>

        <div class="video-container-wrapper">
            <div id="video-container">
                <p>Chargement de la dernière vidéo...</p>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "AIzaSyBPgIGNCHLhyL6Mg9DM0ykZH_SGvzRjOvw"; // Votre clé API
        const CHANNEL_ID = "UCmcqUwau5RY_e3K9SA0pMuw"; // ID confirmé de la chaîne Hyrst

        async function fetchLatestVideo() {
    try {
        const response = await fetch(`https://www.googleapis.com/youtube/v3/search?key=${API_KEY}&channelId=${CHANNEL_ID}&part=snippet&type=video&order=date&maxResults=1`);
        const data = await response.json();

        console.log(data);  // Log de la réponse pour déboguer

        if (data.items && data.items.length > 0) {
            const videoId = data.items[0].id.videoId;
            const videoEmbed = `
                <iframe width="800" height="450" src="https://www.youtube.com/embed/${videoId}" 
                frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen></iframe>
            `;
            document.getElementById('video-container').innerHTML = videoEmbed;
        } else {
            document.getElementById('video-container').innerText = "Aucune vidéo publique trouvée.";
        }
    } catch (error) {
        console.error("Erreur lors de la récupération de la vidéo :", error);
        document.getElementById('video-container').innerText = "Erreur lors de la récupération des vidéos.";
    }
}


        // Appel de la fonction dès le chargement de la page pour afficher la vidéo
        window.onload = function() {
            fetchLatestVideo(); // Charger la dernière vidéo dès le chargement de la page
        };
    </script>
